<div class="min-h-screen">
  <header class="sticky top-0 z-20 backdrop-blur bg-white/5 border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-white/10 grid place-items-center">🌊</div>
        <div>
          <div class="font-semibold">Readathon | El océano de los libros</div>
          <div class="text-xs text-white/70">Tu biblioteca submarina</div>
        </div>
      </div>

      <nav class="flex gap-2 text-sm items-center">
        <a routerLink="/app/dashboard" routerLinkActive="bg-white/10"
          class="px-3 py-2 rounded-xl hover:bg-white/10">Dashboard</a>

        <a routerLink="/app/discover" routerLinkActive="bg-white/10"
          class="px-3 py-2 rounded-xl hover:bg-white/10">Buscar</a>

        <a routerLink="/app/my-books" routerLinkActive="bg-white/10" class="px-3 py-2 rounded-xl hover:bg-white/10">Mis listas</a>

        <a routerLink="/app/change-password" routerLinkActive="bg-white/10" class="px-3 py-2 rounded-xl hover:bg-white/10 transition"> Seguridad </a>
        
        <button (click)="logout()"
          class="ml-2 px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10">
          Salir
        </button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <router-outlet></router-outlet>
  </main>
</div>
