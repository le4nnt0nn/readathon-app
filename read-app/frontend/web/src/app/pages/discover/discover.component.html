<div class="flex flex-col gap-4">
  <div class="p-5 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h2 class="text-xl font-semibold">Buscar libros 🐠</h2>
    <p class="text-white/70 mt-1">Explora y añade a tus listas.</p>

    <div class="mt-4 flex gap-2">
      <input
        class="flex-1 px-4 py-3 rounded-2xl bg-white/10 border border-white/10 outline-none"
        placeholder="Busca por título, autor..."
        [(ngModel)]="q"
        (keyup.enter)="search(true)"
      />
      <button
        class="px-4 py-3 rounded-2xl bg-white/15 hover:bg-white/20 border border-white/10"
        (click)="search(true)"
      >
        Buscar
      </button>
    </div>

    <div class="mt-3 text-sm text-red-200" *ngIf="error">{{ error }}</div>
  </div>

  <div *ngIf="loading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="h-40 rounded-3xl bg-white/5 animate-pulse" *ngFor="let _ of [1,2,3,4,5,6]"></div>
  </div>

  <div *ngIf="!loading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div
      *ngFor="let b of items"
      class="p-4 rounded-3xl bg-white/5 border border-white/10 hover:bg-white/7 transition shadow-lg"
    >
      <div class="flex gap-4">
        <div class="w-20 h-28 rounded-2xl overflow-hidden bg-white/10 border border-white/10 shrink-0">
          <img
            *ngIf="b.thumbnail; else noimg"
            [src]="b.thumbnail"
            [alt]="b.title"
            class="w-full h-full object-cover"
            [class.grayscale]="b.userStatus === 'READ'"
            [class.opacity-70]="b.userStatus === 'READ'"
          />
          <ng-template #noimg>
            <div class="w-full h-full grid place-items-center text-white/60 text-xs">Sin portada</div>
          </ng-template>
        </div>

        <div class="min-w-0">
          <div class="font-semibold leading-5 truncate">{{ b.title }}</div>
          <div class="text-sm text-white/70 mt-1 truncate">
            {{ (b.authors?.length ? b.authors.join(', ') : 'Autor desconocido') }}
          </div>
          <div class="text-xs text-white/60 mt-2 truncate" *ngIf="b.categories?.length">
            {{ b.categories[0] }}
          </div>

          <div class="mt-3 flex gap-2 flex-wrap">
            <button
              class="px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10 text-sm"
              (click)="mark(b,'WANT')"
            >
              + Quiero leer
            </button>
            <button
              class="px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10 text-sm"
              (click)="mark(b,'READ')"
            >
              ✓ Leído
            </button>

            <span
              *ngIf="b.userStatus"
              class="px-3 py-2 rounded-xl text-xs border border-white/10 bg-white/10"
            >
              {{ b.userStatus === 'READ' ? 'Leído' : 'Quiero leer' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-between items-center mt-2" *ngIf="items.length">
    <button class="px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10" (click)="prev()"
      [disabled]="page===0">
      ← Anterior
    </button>
    <div class="text-sm text-white/70">Página {{ page + 1 }}</div>
    <button class="px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10" (click)="next()">
      Siguiente →
    </button>
  </div>
</div>
