<div class="grid md:grid-cols-2 gap-6">
  <section class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h2 class="text-xl font-semibold">Tu océano lector 🌊</h2>
    <p class="text-white/70 mt-1">Resumen rápido de tus lecturas.</p>
    <div *ngIf="!loading; else skel" class="mt-6 grid grid-cols-2 gap-4">
      <div class="p-5 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-blue-600/20 border border-white/10 text-center">
        <div class="text-4xl font-bold text-cyan-300">{{ read }}</div>
        <div class="text-sm text-white/70 mt-1">Libros leídos 📘</div>
      </div>
      <div class="p-5 rounded-2xl bg-gradient-to-br from-purple-500/20 to-indigo-600/20 border border-white/10 text-center">
        <div class="text-4xl font-bold text-purple-300">{{ want }}</div>
        <div class="text-sm text-white/70 mt-1">Quiero leer 📚</div>
      </div>
    </div>
    <ng-template #skel>
      <div class="mt-6 grid grid-cols-2 gap-4">
        <div class="h-24 rounded-2xl bg-white/5 animate-pulse"></div>
        <div class="h-24 rounded-2xl bg-white/5 animate-pulse"></div>
      </div>
    </ng-template>
  </section>

  <section class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h2 class="text-xl font-semibold">Tip submarino 🐠</h2>
    <p class="text-white/70 mt-2 leading-relaxed">
      Entra en <b>Buscar</b> para descubrir libros del mundo y añadirlos a tu lista.
      Cuando marques un libro como <b>Leído</b>, su portada se verá en gris.
    </p>
  </section>
</div>
