<div class="grid md:grid-cols-2 gap-6">
  <section class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h2 class="text-xl font-semibold">Tu océano lector 🌊</h2>
    <p class="text-white/70 mt-1">Resumen rápido de tus lecturas.</p>
    <div *ngIf="!loading; else skel" class="mt-6 grid grid-cols-2 gap-4">
      <div class="p-5 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-blue-600/20 
         border border-white/10 text-center cursor-pointer 
         transition-all duration-200 hover:scale-[1.03] hover:shadow-lg" (click)="goToList('READ')">
        <div class="text-4xl font-bold text-cyan-300">{{ read }}</div>
        <div class="text-sm text-white/70 mt-1">Libros leídos 📘</div>
      </div>
      <div class="p-5 rounded-2xl bg-gradient-to-br from-purple-500/20 to-indigo-600/20 
         border border-white/10 text-center cursor-pointer 
         transition-all duration-200 hover:scale-[1.03] hover:shadow-lg" (click)="goToList('WANT')">
        <div class="text-4xl font-bold text-purple-300">{{ want }}</div>
        <div class="text-sm text-white/70 mt-1">Quiero leer 📚</div>
      </div>
    </div>
    <ng-template #skel>
      <div class="mt-6 grid grid-cols-2 gap-4">
        <div class="h-24 rounded-2xl bg-white/5 animate-pulse"></div>
        <div class="h-24 rounded-2xl bg-white/5 animate-pulse"></div>
      </div>
    </ng-template>
  </section>

  <section class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h2 class="text-xl font-semibold">Tip submarino 🐠</h2>
    <p class="text-white/70 mt-2 leading-relaxed transition-all duration-300" [class.opacity-0]="!tipVisible"
      [class.opacity-100]="tipVisible">
      {{ currentTip }}
    </p>
  </section>
  <div
    class="mt-8 p-6 rounded-3xl bg-gradient-to-br from-white/5 to-white/10 border border-white/10 shadow-xl backdrop-blur-md">
    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
      📚 Géneros más leídos
    </h3>

    <div *ngFor="let g of genres; let i = index" class="mb-5 group">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-medium">{{ g.name }}</span>
        <span class="text-xs px-2 py-1 rounded-full bg-white/10 text-white/70">
          {{ g.count }}
        </span>
      </div>
      <div class="h-3 bg-white/10 rounded-full overflow-hidden">
        <div
          class="h-full rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-400 group-hover:brightness-110"
          [style.width.%]="(g.count / genres[0].count) * 100"></div>
      </div>
    </div>
  </div>

  <div
    class="mt-8 p-6 rounded-3xl bg-gradient-to-br from-white/5 to-white/10 border border-white/10 shadow-xl backdrop-blur-md">
    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
      🏆 Top 3 mejor valorados
    </h3>

    <div *ngFor="let b of topRated; let i = index"
      class="flex items-center gap-4 mb-5 p-3 rounded-2xl bg-white/5 hover:bg-white/10 transition-all duration-300">
      <div class="text-2xl font-bold w-8 text-center">
        <span *ngIf="i === 0">🥇</span>
        <span *ngIf="i === 1">🥈</span>
        <span *ngIf="i === 2">🥉</span>
      </div>
      <img *ngIf="b.thumbnail" [src]="b.thumbnail"
        class="w-14 h-20 rounded-xl object-cover shadow-md transition-transform duration-300 hover:scale-105" />
      <div class="flex-1">
        <div class="font-semibold text-sm leading-tight">
          {{ b.title }}
        </div>
        <div class="text-xs text-white/60 mb-1">
          {{ b.authors?.join(', ') }}
        </div>
        <div class="flex gap-1 text-yellow-400 text-sm">
          <span *ngFor="let star of [1,2,3,4,5]">
            <span *ngIf="b.rating >= star">★</span>
            <span *ngIf="b.rating < star" class="text-white/30">★</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
