<div class="max-w-md mx-auto mt-10">
  <div class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
    <h1 class="text-2xl font-semibold">Únete al océano 🌊</h1>
    <p class="text-white/70 mt-1">Crea tu biblioteca y tus reseñas.</p>

    <form class="mt-6 grid gap-3" (ngSubmit)="submit()">
      <input class="px-4 py-3 rounded-2xl bg-white/10 border border-white/10 outline-none"
             placeholder="Usuario" [(ngModel)]="username" name="username" required minlength="3">

      <input class="px-4 py-3 rounded-2xl bg-white/10 border border-white/10 outline-none"
             placeholder="Email" [(ngModel)]="email" name="email" required>

      <input class="px-4 py-3 rounded-2xl bg-white/10 border border-white/10 outline-none"
             placeholder="Contraseña (mín 8)" type="password" [(ngModel)]="password" name="password" required minlength="8">

      <button class="mt-2 px-4 py-3 rounded-2xl bg-white/15 hover:bg-white/20 border border-white/10">
        Crear cuenta
      </button>

      <p class="text-sm text-white/70">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-[color:var(--foam)] hover:underline">Entra</a>
      </p>

      <p *ngIf="error" class="text-sm text-red-200">{{ error }}</p>
    </form>
  </div>
</div>
