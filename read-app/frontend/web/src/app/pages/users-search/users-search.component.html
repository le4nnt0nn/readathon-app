<div class="p-5 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
  <h2 class="text-xl font-semibold">Buscar usuarios</h2>

  <form class="mt-4 mb-6 relative" (ngSubmit)="search()">
    <input
      type="text"
      name="q"
      [(ngModel)]="q"
      placeholder="Buscar por nombre de usuario..."
      class="w-full px-5 py-3 pl-12 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-400/40 transition-all duration-200"
    />
    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/50">🔍</span>
  </form>

  <div *ngIf="loading" class="mt-4 h-32 rounded-3xl bg-white/5 animate-pulse"></div>

  <div *ngIf="!loading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let user of items" class="p-4 rounded-3xl bg-white/5 border border-white/10">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-xl font-bold shrink-0">
          {{ user.username[0] | uppercase }}
        </div>
        <div class="min-w-0 flex-1">
          <a [routerLink]="['/app/users', user.id]" class="font-semibold truncate block hover:text-cyan-300 transition">
            {{ user.username }}
          </a>
          <div class="text-xs text-white/60 mt-1">
            <span *ngIf="user.friendshipStatus === 'NONE'">Perfil privado</span>
            <span *ngIf="user.friendshipStatus === 'PENDING' && user.direction === 'OUTGOING'">Solicitud enviada</span>
            <span *ngIf="user.friendshipStatus === 'PENDING' && user.direction === 'INCOMING'">Te ha solicitado seguimiento</span>
            <span *ngIf="user.friendshipStatus === 'ACCEPTED'">Amigo</span>
          </div>
        </div>
      </div>

      <div class="flex justify-end mt-4">
        <button
          *ngIf="user.friendshipStatus === 'NONE'"
          type="button"
          (click)="request(user)"
          class="text-xs px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10 transition-all duration-200"
        >
          Solicitar seguimiento
        </button>
        <a
          *ngIf="user.friendshipStatus === 'ACCEPTED'"
          [routerLink]="['/app/users', user.id]"
          class="text-xs px-3 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10 transition-all duration-200"
        >
          Ver perfil
        </a>
      </div>
    </div>
  </div>

  <div *ngIf="searched && !loading && !items.length" class="mt-4 p-5 rounded-2xl bg-white/5 border border-white/10 text-white/70">
    No se han encontrado usuarios.
  </div>
</div>
