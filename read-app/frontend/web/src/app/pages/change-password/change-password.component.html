<div class="max-w-md mx-auto mt-12 p-8 rounded-3xl bg-white/5 border border-white/10 shadow-2xl backdrop-blur">

  <h2 class="text-2xl font-semibold text-white mb-6">
    Cambiar contraseña 🔐
  </h2>

  <form (ngSubmit)="submit()" class="space-y-4">

    <input type="password" placeholder="Contraseña actual" [(ngModel)]="currentPassword" name="currentPassword" required
      class="w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400" />

    <input type="password" placeholder="Nueva contraseña" [(ngModel)]="newPassword" name="newPassword" required
      class="w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400" />

    <input type="password" placeholder="Confirmar nueva contraseña" [(ngModel)]="confirmPassword" name="confirmPassword"
      required
      class="w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400" />

    <button type="submit" [disabled]="loading"
      class="w-full p-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold hover:scale-105 transition disabled:opacity-50">
      {{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}
    </button>

    <p *ngIf="message" class="text-green-400 text-sm mt-3">
      {{ message }}
    </p>

    <p *ngIf="error" class="text-red-400 text-sm mt-3">
      {{ error }}
    </p>

  </form>
</div>
